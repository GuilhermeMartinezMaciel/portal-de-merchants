version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: merchant_postgres_db
    environment:
      - POSTGRES_DB=merchant_db
      - POSTGRES_USER=guilherme_admin
      - POSTGRES_PASSWORD=senha_secreta_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: